metadata:
  dataset_id: phase1-macro-commodities
  version: 2
  as_of: 2026-03-12
  description: 'Starter commodity intelligence graph centered on gold, silver, Brent
    crude, copper, macro indicators, Fed policy, OPEC supply actions, and explanatory
    events.

    '
  derived_claim_pack: curated-macro-commodity-docs
nodes:
